<!--Rentals search. Handles filters and dynamically creates cards 
	based on filters. Endpoint of VehicleSearchEndpoints.java -->


<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Car Rental - Search Rentals</title>
    <link rel="stylesheet" href="css/rentals.css">
</head>
<body>

    <div class="welcome">
        Welcome, <span id="usernameDisplay">Username</span>
    </div>
    <div id="filterAndCars">
        <div class="filterBox">
            <h2>Filter Rentals</h2>

            <div class="filter-group">
                <label>Car Type</label>
                <select id="carType">
                    <option value="">All Types</option>
                    <option value="sedan">Sedan</option>
                    <option value="suv">SUV</option>
                    <option value="truck">Truck</option>
                    <option value="van">Van</option>
                    <option value="convertible">Convertible</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Start Date</label>
                <input type="date" id="startDate">
            </div>

            <div class="filter-group">
                <label>End Date</label>
                <input type="date" id="endDate">
            </div>

            <div class="filter-group">
                <label>Daily Rate Limit</label>
                <input type="text" id="price">
                    
                </input>
            </div>

            <div class="filter-group">
                <label>Year</label>
                <select id="Year">
                    <option value="">Year</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>


            <div class="filter-group">
                <label>Colour</label>
                <select id="colour">
                    <option value="">All Colours</option>
                    <option value="white">White</option>
                    <option value="red">Red</option>
                    <option value="blue">Blue</option>
                    <option value="black">Black</option>
                </select>
            </div>


            <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>




        </div>

        <div id="results">
            <table id="filtered-list"></table> <!-- dynamic cards will be inserted here -->
        </div>

    </div>
    

    <script src="js/rentals.js"></script>

</body>
</html>
