<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental - Rental Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFA500;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .welcome {
            text-align: center;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .welcome span {
            color: #7B3A00;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: #B35A00;
            border-radius: 20px;
            padding: 30px 40px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 28px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            font-size: 16px;
        }

        .detail-label {
            font-weight: bold;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .status-active {
            background-color: #28a745;
            color: white;
        }
        .status-cancelled {
            background-color: #dc3545;
            color: white;
        }
        .status-completed {
            background-color: #6c757d;
            color: white;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .cancel-btn, .back-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .cancel-btn {
            background-color: #dc3545;
            color: white;
        }
        .cancel-btn:hover {
            background-color: #c82333;
        }

        .back-btn {
            background-color: transparent;
            color: white;
            border: 1.5px solid white;
        }
        .back-btn:hover {
            background-color: rgba(255,255,255,0.15);
        }

        .loading, .error {
            text-align: center;
            font-size: 18px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="welcome">
        Welcome, <span id="usernameDisplay">User</span>
    </div>

    <div class="container">
        <h1>Rental Details</h1>
        <div id="details-container">
            <div class="loading">Loading rental details...</div>
        </div>
        <div class="button-group">
            <a href="History.html" class="back-btn">← Back to History</a>
            <button id="cancelBtn" class="cancel-btn" style="display: none;">Cancel Reservation</button>
        </div>
    </div>

    <script src="js/rental_details.js"> </script>
</body>
</html>
