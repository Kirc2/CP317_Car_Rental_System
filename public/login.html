<!--Login & Register page. Handles the record insertion of registration and authentication 
		of login. Endpoint is at Login_RegistrationEndpoints.java -->

<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="hero">
        <img src="imgs/car_image_2.jpg" alt="Header Image">
        <div class="overlay"></div>
    </div>
    <div class="spacer"></div>
    <div class="wrapper">

        <div class="banner"></div>

        <form id="loginBox" class="loginBox">
            <table>
                <tr>
                    <td>
                        <label for="login" class="radioword">login</label>
                        <input id="login" type="radio" name="loginRegister" value="login" checked>
                    </td>
                    <td>
                        <label for="register" class="radioword" color="white">register</label>
                        <input id="register" type="radio" name="loginRegister" value="register">
                        </td>
                </tr>
            </table>
            <div id="loginDisplay">
                <h2 id="loginWord">Login</h2>
                <input id ="username" type="text" placeholder="Username">
                <input id="password" type="password" placeholder="Password">
                <button type="submit">Login</button>
            </div>

            <div id="registerDisplay">
                <h2 id = "registerWord">Register</h2>
                <input id ="username" type="text" placeholder="Username">
                <input id ="email" type="text" placeholder="Email">
                <input id="password" type="password" placeholder="Password">
                <button type="submit">Register</button>
            </div>

        </form>

    </div>

    <div class="extra-content"></div>

    <script src="js/login.js"></script>
</body>
