<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental - Vehicle Reservation</title>
    <link rel="stylesheet" href="css/reservations.css">
        
</head>
<body>
    <div class="container">
        <h1>Vehicle Reservation</h1>
        <div id="details-container">
            <div class="loading">Loading vehicle details...</div>
        </div>
		<div class="dates-section">
            <h3>Rental Dates</h3>
            <div class="filter-group">
                <label>Start Date</label>
                <input type="date" id="rentalStartDate" required>
            </div>
            <div class="filter-group">
                <label>End Date</label>
                <input type="date" id="rentalEndDate" required>
            </div>
        </div>

        <div class="button-group">
            <button id="reserveBtn" class="reserve-btn" style="display: none;">Reserve</button>
        </div>
        
        <div class="button-group">
            <a href="Rentals.html" class="back-btn">← Back to Rentals</a>
			
            <button id="reserveBtn" class="reserve-btn" style="display: none;">Reserve</button>
        </div>

    </div>
	
    <script src="js/reservations.js"></script>
</body>
</html>
