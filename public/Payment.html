

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Car Rental - Payment</title>
    <link rel="stylesheet" href="css/payment.css">
</head>
<body>

    <div class="title">Payment</div>

    <div class="payment-box">
        <h2> Card Details</h2>

        <div class="field-group">
            <label>Cardholder Name</label>
            <input type="text" id="cardName" placeholder="Name on card">
        </div>

        <div class="field-group">
            <label>Card Number</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
        </div>

        <div class="row">
            <div class="field-group">
                <label>Expiry Date</label>
                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="field-group">
                <label>CVV</label>
                <input type="password" id="cvv" placeholder="***" maxlength="3">
            </div>
        </div>

        <hr class="divider">

        <p class="message" id="message"></p>

        <button class="pay-btn" onclick="processPayment()">Confirm Card Details</button>
        <button class="back-btn" onclick="window.location.href='rentals.html'">← Back to Rentals</button>
    </div>
    <script src="js/payment.js"></script>
</body>
</html>
